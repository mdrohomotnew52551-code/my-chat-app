<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ইব্রাহিম ভাইয়ের সুপার চ্যাট রুম</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: white;
            --header-bg: #0084ff;
            --header-text: white;
            --chat-wall: #e5ddd5;
            --received-msg: white;
            --sent-msg: #0084ff;
            --sent-text: white;
            --received-text: #000;
        }

        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: Arial, sans-serif; background: var(--bg-color); }
        body { display: flex; justify-content: center; align-items: center; }
        
        .chat-container { 
            width: 100%; max-width: 420px; background: var(--container-bg); 
            display: flex; flex-direction: column; height: 100%; position: relative; overflow: hidden; box-sizing: border-box;
        }
        
        .auth-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; box-sizing: border-box; }
        .auth-box { width: 100%; max-width: 290px; text-align: center; }
        .auth-title { font-size: 20px; font-weight: bold; color: #0084ff; margin-bottom: 15px; }
        .auth-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 13px; }
        .auth-btn { width: 100%; padding: 10px; background: #0084ff; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .auth-toggle { margin-top: 12px; color: #555; font-size: 12px; cursor: pointer; text-decoration: underline; }
        
        .avatar-picker { width: 75px; height: 75px; border-radius: 50%; background: #e4e6eb; margin: 0 auto 12px auto; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 2px dashed #0084ff; overflow: hidden; }
        .avatar-picker img { width: 100%; height: 100%; object-fit: cover; }

        .chat-header { background: var(--header-bg); color: var(--header-text); padding: 6px 10px; font-size: 14px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; height: 44px; box-sizing: border-box; flex-shrink: 0; z-index: 6; }
        .header-buttons { display: flex; gap: 5px; align-items: center; }
        .video-toggle-btn { background: #ff0050; color: white; border: none; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .logout-btn { background: #ff3b30; color: white; border: none; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; }
        
        .load-more-container { width: 100%; text-align: center; padding: 4px 0; background: transparent; flex-shrink: 0; }
        .load-more-btn { background: rgba(0,0,0,0.06); border: none; padding: 4px 12px; border-radius: 12px; font-size: 11px; color: #444; cursor: pointer; font-weight: bold; }

        .chat-messages { flex: 1; padding: 8px; overflow-y: auto; background: var(--chat-wall); display: flex; flex-direction: column; gap: 8px; box-sizing: border-box; }
        
        .message-row { display: flex; align-items: flex-end; gap: 6px; max-width: 85%; }
        .message-row.sent { align-self: flex-end; flex-direction: row-reverse; }
        .message-row.received { align-self: start; }
        .user-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; background: #ccc; }
        
        .avatar-container { position: relative; display: inline-block; flex-shrink: 0; }
        .online-dot { width: 8px; height: 8px; background-color: #4cd964; border: 1.5px solid var(--chat-wall); border-radius: 50%; position: absolute; bottom: 0; right: 0; display: none; }
        .avatar-container.online .online-dot { display: block; }

        .msg-content-wrapper { display: flex; flex-direction: column; max-width: 100%; }
        .message-row.sent .msg-content-wrapper { align-items: flex-end; }
        .name-tag { font-size: 10px; color: #65676b; margin-bottom: 1px; font-weight: 600; }
        .time-stamp { font-size: 8px; color: #8a8d91; margin-top: 1px; }

        .msg { padding: 6px 10px; border-radius: 14px; word-wrap: break-word; font-size: 13px; line-height: 1.3; max-width: 100%; box-sizing: border-box; }
        .message-row.received .msg { background: var(--received-msg); color: var(--received-text); border-bottom-left-radius: 4px; }
        .message-row.sent .msg { background: var(--sent-msg); color: var(--sent-text); border-bottom-right-radius: 4px; }
        
        audio { max-width: 100%; width: 170px; height: 30px; margin-top: 2px; display: block; }
        .chat-img { max-width: 100%; max-height: 160px; border-radius: 10px; margin-top: 2px; display: block; }

        .chat-input-area { display: flex; padding: 5px 8px; background: var(--container-bg); border-top: 1px solid rgba(0,0,0,0.06); align-items: center; gap: 4px; height: 46px; box-sizing: border-box; flex-shrink: 0; }
        .chat-input { flex: 1; padding: 4px 10px; border: 1px solid #e4e6eb; border-radius: 20px; outline: none; background: var(--bg-color); color: var(--received-text); font-size: 13px; height: 32px; box-sizing: border-box; }
        .send-btn, .mic-btn, .image-btn { background: var(--header-bg); color: var(--header-text); border: none; padding: 0; border-radius: 50%; cursor: pointer; width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        
        /* ─── AI অ্যাক্টিভেশন পপআপ স্টাইল ─── */
        .ai-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; padding: 20px; text-align: center; box-sizing: border-box; }
        .ai-start-btn { background: linear-gradient(135deg, #00f2fe, #4facfe); border: none; padding: 12px 24px; color: white; font-size: 16px; font-weight: bold; border-radius: 30px; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,242,254,0.4); }

        #fileInput, #avatarInput { display: none; }
    </style>
</head>
<body>

<div class="ai-overlay" id="aiActivationOverlay">
    <span style="font-size: 40px;">🤖</span>
    <h3 style="margin: 10px 0;">ইব্রাহিম ভাইয়ের এআই অ্যাসিস্ট্যান্ট</h3>
    <p style="font-size: 13px; color: #ccc; margin: 0 10px;">ব্রাউজারের সিকিউরিটি লক খুলে মেসেজ ভয়েসে শোনার জন্য নিচের বাটনে চাপ দিন ভাই।</p>
    <button class="ai-start-btn" onclick="unlockAiSystem()">এআই ভয়েস চালু করুন 🔊</button>
</div>

<div class="chat-container">
    <div class="auth-screen" id="authScreen">
        <div class="auth-box" id="loginBox">
            <div class="auth-title">🔐 চ্যাট রুমে লগইন করুন</div>
            <input type="text" id="loginUser" class="auth-input" placeholder="ইউজার আইডি (ছোট অক্ষরে)">
            <input type="password" id="loginPass" class="auth-input" placeholder="পাসওয়ার্ড লিখুন">
            <button class="auth-btn" onclick="login()">ভেতরে প্রবেশ করুন</button>
            <div class="auth-toggle" onclick="toggleAuth(false)">নতুন অ্যাকাউন্ট তৈরি করতে এখানে চাপুন</div>
        </div>
        
        <div class="auth-box" id="signupBox" style="display: none;">
            <div class="auth-title">👤 নতুন অ্যাকাউন্ট খুলুন</div>
            <input type="file" id="avatarInput" accept="image/*" onchange="previewAvatar(this)">
            <div class="avatar-picker" onclick="document.getElementById('avatarInput').click()" id="avatarPreviewBox">
                <span style="font-size:12px; color:#0084ff;">📸 ছবি দিন</span>
            </div>
            <input type="text" id="signupName" class="auth-input" placeholder="আপনার আসল নাম">
            <input type="text" id="signupUser" class="auth-input" placeholder="ইউজার আইডি (যেমন: ibrahim)">
            <input type="password" id="signupPass" class="auth-input" placeholder="পাসওয়ার্ড দিন">
            <button class="auth-btn" onclick="signup()">অ্যাকাউন্ট নিশ্চিত করুন</button>
            <div class="auth-toggle" onclick="toggleAuth(true)">ইতিমধ্যে অ্যাকাউন্ট থাকলে লগইন করুন</div>
        </div>
    </div>

    <div class="chat-header">
        <span id="roomTitle">💬 চ্যাট রুম</span>
        <div class="header-buttons">
            <button class="logout-btn" onclick="logout()">লগআউট</button>
        </div>
    </div>

    <div class="load-more-container">
        <button class="load-more-btn" onclick="loadMoreMessages()">旧 পুরনো মেসেজ লোড করুন</button>
    </div>
    
    <div class="chat-messages" id="msgBox"></div>
    
    <div class="chat-input-area">
        <input type="file" id="fileInput" accept="image/*" onchange="sendImage(this)">
        <button class="image-btn" onclick="document.getElementById('fileInput').click()">🖼️</button>
        <input type="text" class="chat-input" id="textInput" placeholder="মেসেজ লিখুন...">
        <button class="send-btn" onclick="sendMsg()">➔</button>
        <button class="mic-btn" id="micBtn" onclick="toggleRecording()">🎤</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDbpbfLrMUXoFjhUC37l",
        authDomain: "eibrahim-a67a6.firebaseapp.com",
        databaseURL: "https://eibrahim-a67a6-default-rtdb.firebaseio.com",
        projectId: "eibrahim-a67a6",
        storageBucket: "eibrahim-a67a6.appspot.com",
        messagingSenderId: "519997364197",
        appId: "1:519997364197:web:35e7720"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentUser = null;
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let selectedAvatarBase64 = "";
    let currentLimit = 30;
    let isInitialLoad = true;
    let isVoiceReady = false;

    window.onload = function() {
        const savedUser = localStorage.getItem("chat_user");
        if(savedUser) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('roomTitle').innerText = `💬 ${currentUser.name}`;
            startChatSystem();
        }
    };

    // এআই ভয়েস লক খোলার মেইন বাটন ফাংশন
    function unlockAiSystem() {
        isVoiceReady = true;
        document.getElementById('aiActivationOverlay').style.display = 'none';
        speakText("হ্যালো ইব্রাহিম ভাই! এআই ভয়েস সিস্টেম এখন অ্যাক্টিভ হয়েছে।");
    }

    function speakText(text) {
        if ('speechSynthesis' in window && isVoiceReady) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'bn-BD';
            utterance.rate = 1.0;
            
            const voices = window.speechSynthesis.getVoices();
            const bnVoice = voices.find(v => v.lang.includes('BN') || v.lang.includes('bn'));
            if(bnVoice) utterance.voice = bnVoice;
            
            window.speechSynthesis.speak(utterance);
        }
    }

    function toggleAuth(showLogin) {
        document.getElementById('loginBox').style.display = showLogin ? 'block' : 'none';
        document.getElementById('signupBox').style.display = showLogin ? 'none' : 'block';
    }

    function previewAvatar(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function (e) {
                selectedAvatarBase64 = e.target.result;
                document.getElementById('avatarPreviewBox').innerHTML = `<img src="${selectedAvatarBase64}" style="width:100%;height:100%;object-fit:cover;" />`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function signup() {
        const name = document.getElementById('signupName').value.trim();
        const username = document.getElementById('signupUser').value.trim().toLowerCase();
        const pass = document.getElementById('signupPass').value.trim();

        if(!name || !username || !pass || !selectedAvatarBase64) { alert("সব তথ্য সঠিকভাবে দিন ভাই!"); return; }

        database.ref("users").child(username).once("value", function(snapshot) {
            if(snapshot.exists()) { alert("এই আইডিটি ইতিমধ্যে রেজিস্টার্ড!"); }
            else {
                database.ref("users").child(username).set({ "name": name, "password": pass, "avatar": selectedAvatarBase64 }, function(error) {
                    if(!error) { alert("অ্যাকাউন্ট তৈরি সফল! লগইন করুন।"); toggleAuth(true); }
                });
            }
        });
    }

    function login() {
        const username = document.getElementById('loginUser').value.trim().toLowerCase();
        const pass = document.getElementById('loginPass').value.trim();

        if(!username || !pass) { alert("আইডি ও পাসওয়ার্ড দিন!"); return; }

        database.ref("users").child(username).once("value", function(snapshot) {
            if(snapshot.exists() && snapshot.val().password === pass) {
                currentUser = { "username": username, "name": snapshot.val().name, "avatar": snapshot.val().avatar };
                localStorage.setItem("chat_user", JSON.stringify(currentUser));
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('roomTitle').innerText = `💬 ${currentUser.name}`;
                startChatSystem();
            } else { alert("ভুল পাসওয়ার্ড বা আইডি!"); }
        });
    }

    function logout() {
        localStorage.removeItem("chat_user");
        location.reload();
    }

    function startChatSystem() {
        listenMessages();
    }

    function listenMessages() {
        const msgBox = document.getElementById('msgBox');
        msgBox.innerHTML = "";
        isInitialLoad = true;

        const msgRef = database.ref("messages").orderByChild("timestamp").limitToLast(currentLimit);
        
        msgRef.once("value", function() {
            setTimeout(() => { isInitialLoad = false; }, 1500);
        });

        msgRef.on("child_added", function(snapshot) {
            const key = snapshot.key;
            const data = snapshot.val();
            if(!currentUser || !data) return;

            const msgRow = document.createElement('div');
            msgRow.className = (data.senderId === currentUser.username) ? "message-row sent" : "message-row received";

            const senderAvatar = data.avatar || "https://www.w3schools.com/howto/img_avatar.png";
            const senderName = data.senderName || "ইউজার";

            let contentHtml = "";
            let speechContent = "একটি মেসেজ পাঠিয়েছেন";

            if(data.type === "image") {
                contentHtml = `<img src="${data.message}" class="chat-img" />`;
                speechContent = "একটি ছবি পাঠিয়েছেন";
            } else if(data.type === "audio") {
                contentHtml = `<audio src="${data.message}" controls preload="none"></audio>`;
                speechContent = "একটি ভয়েস মেসেজ পাঠিয়েছেন";
            } else {
                contentHtml = data.message;
                speechContent = "বলছেন: " + data.message;
            }

            msgRow.innerHTML = `
                <div class="avatar-container"><img src="${senderAvatar}" class="user-avatar" /></div>
                <div class="msg-content-wrapper">
                    <span class="name-tag">${data.senderId === currentUser.username ? 'আপনি' : senderName}</span>
                    <div class="msg">${contentHtml}</div>
                </div>
            `;

            msgBox.appendChild(msgRow);
            msgBox.scrollTop = msgBox.scrollHeight;

            // 🤖 নতুন মেসেজ আসলে এআই স্বয়ংক্রিয়ভাবে কথা বলবে
            if(!isInitialLoad && data.senderId !== currentUser.username) {
                speakText(senderName + " " + speechContent);
            }
        });
    }

    function loadMoreMessages() {
        currentLimit += 20;
        listenMessages();
    }

    function sendMsg() {
        const textInput = document.getElementById('textInput');
        const message = textInput.value.trim();
        if(message !== "" && currentUser) {
            database.ref("messages").push().set({
                "senderId": currentUser.username, "senderName": currentUser.name, "avatar": currentUser.avatar, "message": message, "type": "text", "timestamp": Date.now()
            });
            textInput.value = "";
        }
    }

    function sendImage(input) {
        if (input.files && input.files[0] && currentUser) {
            const reader = new FileReader();
            reader.onload = function (e) {
                database.ref("messages").push().set({
                    "senderId": currentUser.username, "senderName": currentUser.name, "avatar": currentUser.avatar, "message": e.target.result, "type": "image", "timestamp": Date.now()
                });
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function toggleRecording() {
        const micBtn = document.getElementById('micBtn');
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        if(currentUser) {
                            database.ref("messages").push().set({
                                "senderId": currentUser.username, "senderName": currentUser.name, "avatar": currentUser.avatar, "message": reader.result, "type": "audio", "timestamp": Date.now()
                            });
                        }
                    };
                };
                mediaRecorder.start(); isRecording = true; micBtn.innerText = "🛑";
            } catch (err) { alert("মাইক্রোফোন অন করার পারমিশন দিন ভাই!"); }
        } else {
            mediaRecorder.stop(); isRecording = false; micBtn.innerText = "🎤";
        }
    }
</script>

</body>
</html>
